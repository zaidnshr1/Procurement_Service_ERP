version: "3.8"

services:
  db:
    image: postgres:16-alpine
    container_name: procurement_db_container
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASS: ${DB_PASS}
    ports:
      - ${DB_PORT}:5432
    volumes:
      - postgres-data:/var/lib/postgresql/data

  app:
    build: .
    container_name: procurement_app_container
    depends_on:
      - db
    ports:
      - ${SERVER_PORT}:8080
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      SERVER_PORT: 8080

volumes:
  postgres-data: